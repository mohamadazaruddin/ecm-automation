<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Mapping</title>
    <style>
      :root {
        --primary: #86bc25;
        --primary-dark: #6ea01e;
        --bg: #0f1115;
        --card: #171a21;
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: #2a2f3a;
        --danger: #da291c;
        --blue: #007cb0;
        --input-bg: #111827;
        --table-head: #1f2937;
        --row-bg: #171a21;
        --row-hover: #202634;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        padding: 24px;
      }

      .container {
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 28px;
        color: var(--text);
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
      }

      .tab-btn {
        padding: 12px 18px;
        border: 1px solid var(--border);
        border-radius: 10px;
        cursor: pointer;
        background: #1b2230;
        color: var(--text);
        font-weight: 600;
        transition: 0.2s ease;
      }

      .tab-btn:hover {
        background: #242c3b;
      }

      .tab-btn.active {
        background: var(--primary);
        color: #0b0f07;
        border-color: var(--primary);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
      }

      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 12px 16px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
      }

      .card h3 {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .card p {
        font-size: 28px;
        font-weight: bold;
        color: var(--primary);
      }

      .panel {
        background: var(--card);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .toolbar input,
      .todo-input-row input {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        width: 100%;
        outline: none;
        background: var(--input-bg);
        color: var(--text);
      }

      .toolbar input::placeholder,
      .todo-input-row input::placeholder {
        color: var(--muted);
      }

      .toolbar input:focus,
      .todo-input-row input:focus {
        border-color: var(--primary);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow-x: auto;
        background: var(--row-bg);
      }

      th,
      td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        color: var(--text);
      }

      th {
        background: var(--primary);
        color: var(--row-bg);
      }

      tbody tr {
        background: var(--row-bg);
      }

      tbody tr:hover {
        background: var(--row-hover);
      }

      .table-wrap {
        overflow-x: auto;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(134, 188, 37, 0.15);
        color: #b8e26a;
        font-size: 12px;
        font-weight: 700;
      }

      .todo-input-row {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        cursor: pointer;
        border-radius: 10px;
        padding: 12px 16px;
        font-weight: 600;
      }

      .btn-primary {
        background: var(--primary);
        color: #0b0f07;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
      }

      .btn-delete {
        background: var(--danger);
        color: white;
        padding: 8px 12px;
      }

      .btn-toggle {
        background: var(--blue);
        color: white;
        padding: 8px 12px;
      }

      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .todo-item {
        background: #111827;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .todo-text.completed {
        text-decoration: line-through;
        color: var(--muted);
      }

      .todo-actions {
        display: flex;
        gap: 8px;
      }

      .empty {
        color: var(--muted);
        padding: 12px 0;
      }
      .badge-qc {
        background: #ffd9662a;
        color: #ffd966;
        border: 1px solid #ffd966;
      }

      .badge-analyst {
        background: #9c66ff3e;
        color: #a97bff;
        border: 1px solid #a97bff;
      }

      .badge-sampling {
        background: #f4686a35;
        color: #f4686a;
        border: 1px solid #f4686a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Team Mapping</h1>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">
          Dashboard
        </button>
        <button class="tab-btn" onclick="switchTab('todo')">To Do List</button>
      </div>

      <section id="dashboard" class="tab-content active">
        <div class="cards" id="insightCards"></div>

        <div class="panel">
          <div class="toolbar">
            <input
              type="text"
              id="searchInput"
              placeholder="Search multiple values using spaces"
            />
          </div>

          <div class="table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="todo" class="tab-content">
        <div class="panel">
          <div class="todo-input-row">
            <input type="text" id="todoInput" placeholder="Enter a task..." />
            <button class="btn-primary" onclick="addTodo()">Add Task</button>
          </div>

          <div class="todo-list" id="todoList"></div>
        </div>
      </section>
    </div>

    <script>
      const dashboardData = [
        {
          Name: "Azar",
          TD_mail: "azar@td.com",
          TD_start_date: 46115,
          TD_Role: "Sampling Analyst",
          QC: "Shweta",
          TL: "Surya",
          POD: "Puneet",
        },
        {
          Name: "hezron",
          TD_mail: "hezron@td.com",
          TD_start_date: 46116,
          TD_Role: "QC",
          QC: "Shweta",
          TL: "Surya",
          POD: "Puneet",
        },
        {
          Name: "omkar",
          TD_mail: "om@td.com",
          TD_start_date: 46117,
          TD_Role: "Analyst",
          QC: "Pragya",
          TL: "Surya",
          POD: "Puneet",
        },
        {
          Name: "shreya",
          TD_mail: "shr@td.com",
          TD_start_date: 46118,
          TD_Role: "Team Lead",
          QC: "Rishi",
          TL: "Azar",
          POD: "Puneet",
        },
      ];

      const originalData = [...dashboardData];
      let filteredData = [...originalData];

      function switchTab(tabId) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((tab) => tab.classList.remove("active"));

        document
          .querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`)
          .classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }

      function renderCards(data) {
        const totalCount = data.length;

        const uniqueAnalysts = new Set(data.map((item) => item.Name)).size;
        const uniqueQC = new Set(data.map((item) => item.QC)).size;
        const uniqueTL = new Set(data.map((item) => item.TL)).size;

        const cards = [
          { title: "Total Count", value: totalCount },
          { title: "Analysts", value: uniqueAnalysts },
          { title: "QC", value: uniqueQC },
          { title: "Team Lead", value: uniqueTL },
        ];

        document.getElementById("insightCards").innerHTML = cards
          .map(
            (card) => `
            <div class="card">
              <h3>${card.title}</h3>
              <p>${card.value}</p>
            </div>
          `,
          )
          .join("");
      }

      function renderTable(data) {
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");

        if (!data.length) {
          tableHead.innerHTML = "";
          tableBody.innerHTML = `
          <tr>
            <td colspan="1" style="text-align:center; color:#6b7280;">
              No matching records found.
            </td>
          </tr>
        `;
          return;
        }

        const headers = Object.keys(data[0]);

        tableHead.innerHTML = `
        <tr>
          ${headers.map((key) => `<th>${key.replaceAll("_", " ")}</th>`).join("")}
        </tr>
      `;

        tableBody.innerHTML = data
          .map(
            (item) => `
      <tr>
        ${headers
          .map((key) => {
            const value = item[key] ?? "";
            const roleText = String(value).toLowerCase();

            if (key === "TD_Role") {
              if (roleText.includes("qc")) {
                return `<td><span class="badge badge-qc">${value}</span></td>`;
              }

              if (roleText.includes("sampling")) {
                return `<td><span class="badge badge-sampling">${value}</span></td>`;
              }
              if (roleText.includes("analyst")) {
                return `<td><span class="badge badge-analyst">${value}</span></td>`;
              }

              return `<td>${value}</td>`;
            }

            return `<td>${value}</td>`;
          })
          .join("")}
      </tr>
    `,
          )
          .join("");
      }

      function applySearch() {
        const searchValue = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();

        if (!searchValue) {
          filteredData = [...originalData];
          renderTable(filteredData);
          // renderCards(filteredData);
          return;
        }

        const searchTerms = searchValue.split(/\s+/);

        filteredData = originalData.filter((item) => {
          const rowText = Object.values(item).join(" ").toLowerCase();
          return searchTerms.some((term) => rowText.includes(term));
        });

        renderTable(filteredData);
      }

      renderCards(filteredData);
      document
        .getElementById("searchInput")
        .addEventListener("input", applySearch);

      const TODO_STORAGE_KEY = "todo_app_items";

      function getTodos() {
        return JSON.parse(localStorage.getItem(TODO_STORAGE_KEY)) || [];
      }

      function saveTodos(todos) {
        localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
      }

      function addTodo() {
        const input = document.getElementById("todoInput");
        const text = input.value.trim();

        if (!text) return;

        const todos = getTodos();
        todos.push({
          id: Date.now(),
          text,
          completed: false,
        });

        saveTodos(todos);
        input.value = "";
        renderTodos();
      }

      function toggleTodo(id) {
        const todos = getTodos().map((todo) =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo,
        );
        saveTodos(todos);
        renderTodos();
      }

      function deleteTodo(id) {
        const todos = getTodos().filter((todo) => todo.id !== id);
        saveTodos(todos);
        renderTodos();
      }

      function renderTodos() {
        const todoList = document.getElementById("todoList");
        const todos = getTodos();

        if (!todos.length) {
          todoList.innerHTML = `<div class="empty">No tasks yet. Add one above.</div>`;
          return;
        }

        todoList.innerHTML = todos
          .map(
            (todo) => `
            <div class="todo-item">
              <div class="todo-text ${todo.completed ? "completed" : ""}">
                ${todo.text}
              </div>
              <div class="todo-actions">
                <button class="btn-toggle" onclick="toggleTodo(${todo.id})">
                  ${todo.completed ? "Undo" : "Done"}
                </button>
                <button class="btn-delete" onclick="deleteTodo(${todo.id})">
                  Delete
                </button>
              </div>
            </div>
          `,
          )
          .join("");
      }

      renderCards(filteredData);
      renderTable(filteredData);
      renderTodos();
    </script>
  </body>
</html>
